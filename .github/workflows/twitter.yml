name: F1 News Bot
on:
  schedule:
    # 🏎️ RACE WEEKEND: Runs every 2 hours on Friday (5), Saturday (6), and Sunday (0)
    - cron: '0 */2 * * 0,5,6'
    
    # 🛋️ WEEKDAYS: Runs every 6 hours on Monday (1) through Thursday (4)
    - cron: '0 */6 * * 1-4'
    
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  run-bot:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - run: npm install
      - run: node index.js
        env:
          API_KEY: ${{ secrets.API_KEY }}
          API_SECRET: ${{ secrets.API_SECRET }}
          ACCESS_TOKEN: ${{ secrets.ACCESS_TOKEN }}
          ACCESS_SECRET: ${{ secrets.ACCESS_SECRET }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GOOGLE_SEARCH_API_KEY: ${{ secrets.GOOGLE_SEARCH_API_KEY }}
          SEARCH_ENGINE_ID: ${{ secrets.SEARCH_ENGINE_ID }}
      - name: Save Bot History
        run: |
          git config --global user.name "F1 Bot"
          git config --global user.email "bot@github.com"
          git add posted_history.txt
          git commit -m "Update F1 news history" || echo "No changes"
          git push
