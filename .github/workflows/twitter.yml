name: F1 News Bot
on:
  schedule:
    - cron: '0 */3 * * *' # Runs every 3 hours
  workflow_dispatch:
jobs:
  run-bot:
    runs-on: ubuntu-latest
    steps:
      # Updated from v3 to v4
      - uses: actions/checkout@v4
      
      # Updated from v3 to v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22' # Upgraded to a newer Node.js LTS version
          
      - run: npm install
      - run: node index.js
        env:
          API_KEY: ${{ secrets.API_KEY }}
          API_SECRET: ${{ secrets.API_SECRET }}
          ACCESS_TOKEN: ${{ secrets.ACCESS_TOKEN }}
          ACCESS_SECRET: ${{ secrets.ACCESS_SECRET }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GOOGLE_SEARCH_API_KEY: ${{ secrets.GOOGLE_SEARCH_API_KEY }}
          SEARCH_ENGINE_ID: ${{ secrets.SEARCH_ENGINE_ID }}
      - name: Save Bot History
        run: |
          git config --global user.name "F1 Bot"
          git config --global user.email "bot@github.com"
          git add posted_history.txt
          git commit -m "Update F1 news history" || echo "No changes"
          git push
